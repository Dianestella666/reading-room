<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读书小屋 · 与CC一起读</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF6EF;--cream-dark:#F0EBE0;--cream-mid:#F5F0E8;
  --amber:#C8956A;--amber-light:#EDD9C0;--amber-pale:#FAF0E3;
  --ink:#2C2416;--ink-mid:#5C4D38;--ink-light:#9A8972;--ink-pale:#C4B8A8;
  --accent:#8B5E3C;--chat-bg:#FFFCF8;
  --border:rgba(160,130,90,0.18);--border-mid:rgba(160,130,90,0.32);--border-strong:rgba(160,130,90,0.45);
  --user-bubble:#EDE3D6;--review-bg:#FDF6EC;
  --teal:#4A8C8C;--teal-light:#E0F0EF;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── BOOKSHELF VIEW ── */
#shelfView{flex:1;display:flex;flex-direction:column;overflow:hidden}
#shelfView.hidden{display:none}

.shelf-header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px 14px;background:var(--cream-dark);border-bottom:1px solid var(--border-strong);flex-shrink:0}
.shelf-logo{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--accent)}
.shelf-logo em{font-style:normal;font-weight:400;font-size:14px;color:var(--ink-light);margin-left:8px}
.shelf-actions{display:flex;align-items:center;gap:10px}
.add-book-btn{display:flex;align-items:center;gap:7px;background:var(--accent);color:white;border:none;border-radius:9px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.add-book-btn:hover{opacity:.85}
.add-book-btn svg{width:15px;height:15px;fill:white}

.shelf-body{flex:1;overflow-y:auto;padding:32px}
.shelf-greeting{font-family:'Lora',serif;font-size:18px;color:var(--ink-mid);margin-bottom:6px}
.shelf-greeting strong{color:var(--accent)}
.shelf-sub{font-size:13px;color:var(--ink-light);margin-bottom:28px}

.shelf-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center;gap:16px}
.shelf-empty-icon{width:72px;height:72px;background:var(--amber-light);border-radius:18px;display:flex;align-items:center;justify-content:center}
.shelf-empty-icon svg{width:36px;height:36px;fill:var(--amber)}
.shelf-empty h2{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--accent)}
.shelf-empty p{font-size:14px;color:var(--ink-light);line-height:1.8;max-width:320px}

.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.book-card{background:white;border:1px solid var(--border-mid);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber-light);transition:background .18s}
.book-card:hover{box-shadow:0 4px 20px rgba(100,70,30,.1);transform:translateY(-1px)}
.book-card:hover::before{background:var(--amber)}
.book-card-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;padding-right:60px}
.book-card-author{font-size:12px;color:var(--ink-light);margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:40px}
.book-card-progress{margin-bottom:12px}
.progress-bar-bg{height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden;margin-bottom:5px}
.progress-bar-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:var(--ink-light)}
.book-card-stats{display:flex;gap:12px}
.stat-pill{font-size:11px;color:var(--ink-mid);background:var(--cream-mid);padding:3px 9px;border-radius:12px;display:flex;align-items:center;gap:4px}
.book-card-date{position:absolute;top:16px;right:16px;font-size:11px;color:var(--ink-pale);white-space:nowrap}
.book-card-continue{display:none;position:absolute;bottom:16px;right:16px;font-size:12px;font-weight:500;color:var(--accent);background:var(--amber-light);padding:4px 12px;border-radius:20px}
.book-card:hover .book-card-continue{display:block}
.book-card-delete{display:none;position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:6px;border:none;background:rgba(198,40,40,0.08);cursor:pointer;align-items:center;justify-content:center;transition:all .15s;z-index:2}
.book-card-delete svg{width:13px;height:13px;fill:#C62828;opacity:.5;transition:opacity .15s}
.book-card:hover .book-card-delete{display:flex}
.book-card:hover .book-card-date{display:none}
.book-card-delete:hover{background:rgba(198,40,40,0.15)}
.book-card-delete:hover svg{opacity:1}

/* ── READING VIEW ── */
#readingView{flex:1;display:flex;flex-direction:column;overflow:hidden}
#readingView.hidden{display:none}

header{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--cream-dark);border-bottom:1px solid var(--border-strong);flex-shrink:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border-mid);border-radius:7px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-mid);cursor:pointer;transition:all .15s;white-space:nowrap}
.back-btn:hover{background:var(--cream-mid);color:var(--accent)}
.back-btn svg{width:13px;height:13px;fill:currentColor}
.logo{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap}
.logo em{color:var(--ink-light);font-style:normal;font-weight:400;font-size:12px;margin-left:4px}
.book-info{flex:1;min-width:0}
.book-title-display{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-subtitle{font-size:11px;color:var(--ink-light);margin-top:1px}
.sync-badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;transition:all .3s}
.sync-ok{background:#E8F5E9;color:#2E7D32}.sync-ing{background:var(--amber-light);color:var(--accent)}.sync-err{background:#FFEBEE;color:#C62828}
.import-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.import-btn:hover{opacity:.85}
.import-btn svg{width:14px;height:14px;fill:white;flex-shrink:0}
#fileInput{display:none}

.main{display:flex;flex:1;overflow:hidden}
.chapter-nav{width:200px;flex-shrink:0;background:var(--cream-mid);border-right:1px solid var(--border-mid);display:flex;flex-direction:column;overflow:hidden;transition:width .25s}
.chapter-nav.collapsed{width:0}
.nav-header{padding:10px 13px 7px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.nav-label{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--ink-light);text-transform:uppercase}
.chapter-list{flex:1;overflow-y:auto;padding:4px 0}
.chap-item{padding:7px 13px;font-size:13px;color:var(--ink-mid);cursor:pointer;border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.chap-item:hover{background:var(--amber-pale);color:var(--accent)}
.chap-item.active{border-left-color:var(--amber);background:var(--amber-pale);color:var(--accent);font-weight:500}
.book-panel{flex:1.3;display:flex;flex-direction:column;border-right:1px solid var(--border-strong);background:var(--cream);min-width:0}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.panel-label{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--ink-light);text-transform:uppercase;white-space:nowrap}
.panel-actions{display:flex;align-items:center;gap:5px}
.btn-sm{font-size:12px;color:var(--accent);background:var(--amber-light);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn-sm:hover{opacity:.75}
.btn-icon{width:26px;height:26px;background:var(--amber-light);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.btn-icon:hover{opacity:.75}
.btn-icon svg{width:13px;height:13px;fill:var(--accent)}
.chapter-nav-bar{display:none;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--amber-pale);border-bottom:1px solid var(--border);flex-shrink:0}
.chapter-nav-bar.visible{display:flex}
.nav-arrow{background:none;border:1px solid var(--border-mid);border-radius:5px;padding:2px 9px;font-size:12px;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-arrow:hover{background:var(--amber-light)}
.nav-arrow:disabled{opacity:.3;cursor:not-allowed}
.chap-title-cur{font-family:'Lora',serif;font-size:13px;font-weight:500;color:var(--accent);max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-content{flex:1;overflow-y:auto;padding:28px 44px 44px}
.book-text{font-family:'Noto Serif SC','Lora',serif;font-size:17px;line-height:2.1;color:var(--ink);letter-spacing:.04em;white-space:pre-wrap;word-break:break-word;user-select:text;cursor:text}
.drop-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;text-align:center;padding:40px;cursor:pointer;transition:background .2s}
.drop-zone:hover,.drop-zone.drag-over{background:var(--amber-pale)}
.drop-icon{width:56px;height:56px;background:var(--amber-light);border-radius:13px;display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:28px;height:28px;fill:var(--amber)}
.drop-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--accent)}
.drop-sub{font-size:13px;color:var(--ink-light);line-height:1.8}
.drop-formats{display:flex;gap:7px}
.fmt{font-size:12px;background:var(--amber-light);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:500}
.sel-menu{position:fixed;z-index:1000;background:var(--ink);border-radius:10px;padding:5px;display:flex;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sel-btn{font-size:12px;font-weight:500;color:white;background:rgba(255,255,255,.12);border:none;border-radius:6px;padding:5px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background .15s}
.sel-btn:hover{background:rgba(255,255,255,.22)}
.sel-btn.discuss{background:rgba(200,149,106,.5)}
.sel-btn.discuss:hover{background:rgba(200,149,106,.7)}
.right-panel{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);min-width:0}
.right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rtab{flex:1;padding:10px 0;font-size:13px;font-weight:500;color:var(--ink-light);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.rtab:hover{color:var(--accent)}
.rtab.active{color:var(--accent);border-bottom-color:var(--amber)}
.tab-count{font-size:10px;background:var(--amber-light);color:var(--accent);padding:1px 6px;border-radius:10px;font-weight:600}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:12px 13px 6px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
.msg{display:flex;flex-direction:column;gap:3px;max-width:92%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-user{align-self:flex-end;align-items:flex-end}
.msg-ai{align-self:flex-start;align-items:flex-start}
.msg-role{font-size:11px;color:var(--ink-pale);padding:0 3px}
.bubble{padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.82;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.msg-user .bubble{background:var(--user-bubble);border-bottom-right-radius:3px}
.msg-ai .bubble{background:white;border:1px solid var(--border-strong);border-bottom-left-radius:3px}
.msg-ai.is-review .bubble{background:var(--review-bg);border-color:var(--amber);border-left:3px solid var(--amber)}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ink-light);margin:0 2px;animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.quick-prompts{display:flex;flex-wrap:wrap;gap:4px;padding:0 11px 8px}
.qp{font-size:11.5px;color:var(--ink-mid);background:white;border:1px solid var(--border-mid);border-radius:20px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.qp:hover{background:var(--amber-light);border-color:var(--amber);color:var(--accent)}
.qp.review-qp{border-color:var(--amber);color:var(--accent)}
.chat-input-area{padding:10px 11px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;border:1px solid var(--border-mid);border-radius:10px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);background:white;resize:none;outline:none;max-height:100px;overflow-y:auto;line-height:1.5;transition:border-color .2s}
.chat-input::placeholder{color:var(--ink-pale)}.chat-input:focus{border-color:var(--amber)}
.send-btn{width:35px;height:35px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;flex-shrink:0}
.send-btn:hover{opacity:.85}.send-btn:active{transform:scale(.95)}.send-btn:disabled{opacity:.35;cursor:not-allowed}
.send-btn svg{width:15px;height:15px;fill:white}
.notebook-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.notebook-content{flex:1;overflow-y:auto;padding:14px 13px}
.notebook-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--ink-pale);text-align:center;padding:30px}
.notebook-empty svg{width:36px;height:36px;fill:var(--ink-pale);opacity:.4}
.notebook-empty p{font-size:13px;line-height:1.7}
.nb-chapter-group{margin-bottom:20px}
.nb-chapter-label{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--ink-pale);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.nb-entry{background:white;border:1px solid var(--border-mid);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.nb-entry-type{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.nb-entry-type.review{color:var(--amber)}.nb-entry-type.note{color:var(--teal)}
.nb-quote{font-family:'Noto Serif SC','Lora',serif;font-size:12px;color:var(--ink-mid);border-left:2px solid var(--teal-light);padding:3px 8px;margin-bottom:6px;line-height:1.6;font-style:italic}
.nb-body{font-size:13px;color:var(--ink);line-height:1.75;white-space:pre-wrap}
.nb-time{font-size:11px;color:var(--ink-pale);margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,22,.35);z-index:2000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--cream);border-radius:14px;width:460px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.18);overflow:hidden;animation:slideUp .18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--accent)}
.modal-subtitle{font-size:12px;color:var(--ink-light);margin-top:2px}
.modal-quote{margin:14px 18px 0;font-family:'Noto Serif SC','Lora',serif;font-size:13px;color:var(--ink-mid);border-left:3px solid var(--amber);padding:6px 12px;line-height:1.7;font-style:italic;background:var(--amber-pale);border-radius:0 6px 6px 0}
.modal-body{padding:14px 18px 18px}
.modal-textarea{width:100%;border:1px solid var(--border-mid);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:white;resize:none;outline:none;height:110px;line-height:1.6;transition:border-color .2s}
.modal-textarea::placeholder{color:var(--ink-pale)}.modal-textarea:focus{border-color:var(--amber)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.modal-cancel{background:none;border:1px solid var(--border-mid);border-radius:7px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-mid);cursor:pointer;transition:all .15s}
.modal-cancel:hover{background:var(--cream-dark)}
.modal-save{background:var(--accent);border:none;border-radius:7px;padding:7px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:white;cursor:pointer;transition:opacity .15s}
.modal-save:hover{opacity:.85}
.welcome-card{margin:5px 0 2px;padding:12px 14px;background:linear-gradient(135deg,var(--amber-light),#F9EDD8);border-radius:11px;border:1px solid rgba(200,149,106,.25)}
.welcome-card h3{font-family:'Lora',serif;font-size:13.5px;font-weight:600;color:var(--accent);margin-bottom:4px}
.welcome-card p{font-size:12.5px;color:var(--ink-mid);line-height:1.75}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
@media(max-width:750px){.chapter-nav{display:none}.book-panel{border-right:none;border-bottom:1px solid var(--border-strong);max-height:43vh}.main{flex-direction:column}}

/* ── DEBUG TOAST ── */
.debug-toast{position:fixed;bottom:16px;left:16px;background:#2C2416;color:#EDD9C0;font-size:12px;padding:8px 14px;border-radius:8px;z-index:9999;max-width:400px;line-height:1.5;animation:fadeIn .2s ease;pointer-events:none;opacity:0;transition:opacity .3s}
.debug-toast.show{opacity:1}
</style>
</head>
<body>

<!-- ══════════════ BOOKSHELF VIEW ══════════════ -->
<div id="shelfView">
  <div class="shelf-header">
    <div>
      <div class="shelf-logo">读书小屋<em>· 与CC一起读</em></div>
    </div>
    <div class="shelf-actions">
      <span class="sync-badge sync-ok" id="shelfSyncBadge">☁️ 已连接</span>
      <button class="add-book-btn" onclick="document.getElementById('fileInputShelf').click()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        导入新书
      </button>
      <input type="file" id="fileInputShelf" accept=".epub,.txt,.md" onchange="handleShelfFileSelect(event)" style="display:none">
    </div>
  </div>
  <div class="shelf-body" id="shelfBody">
    <div class="shelf-greeting" id="shelfGreeting"></div>
    <div class="shelf-sub" id="shelfSub">点击一本书继续阅读，或导入新书</div>
    <div id="booksGrid" class="books-grid"></div>
    <div id="shelfEmpty" class="shelf-empty" style="display:none">
      <div class="shelf-empty-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
      <h2>书架还空着</h2>
      <p>导入第一本书，我们就开始一起读吧 ✨</p>
    </div>
  </div>
</div>

<!-- ══════════════ READING VIEW ══════════════ -->
<div id="readingView" class="hidden">
  <header>
    <button class="back-btn" onclick="goToShelf()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      书架
    </button>

async function loadShelf() {

    .from('reading_sessions')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    console.error('[loadShelf] 查询失败:', error);

    return;

        <div class="progress-text">第 ${s.current_chapter + 1} 章 / 共 ${s.total_chapters} 章 · ${pct}%</div>

  const ext = file.name.split('.').pop().toLowerCase();
  try {
    if (ext === 'epub') await parseEpub(file);
    else if (ext === 'txt' || ext === 'md') await parseTxt(file);
    else throw new Error('不支持的格式');
    await renderBook();
  } catch (err) {
    console.error(err);
    alert('解析失败：' + err.message);
  }
}

async function renderBook() {
  const { title, author, chapters } = bookData;
  if (!title || chapters.length === 0) return;

  // 先创建 session（如果已存在则复用）

// 获取或创建 session（修复版）
async function getOrCreateSession(title, author, totalChapters) {
  if (!supabaseReady) return 0;

  // 查询是否已存在
  const { data, error } = await sb
    .from('reading_sessions')
    .select('*')
    .eq('book_title', title)
    .maybeSingle();

  if (data) {
    sessionId = data.id;
    return data.current_chapter || 0;
  }

  // 不存在则插入
  const { data: newSession, error: insertError } = await sb
    .from('reading_sessions')
    .insert({
      book_title: title,
      book_author: author,
      total_chapters: totalChapters,
      current_chapter: 0,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    })
    .select()
    .single();

  if (insertError) {
    console.error('插入失败:', insertError);
    return 0;
  }

  sessionId = newSession.id;
  return 0;
}
