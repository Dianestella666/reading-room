<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读书小屋 · 与CC一起读</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF6EF;--cream-dark:#F0EBE0;--cream-mid:#F5F0E8;
  --amber:#C8956A;--amber-light:#EDD9C0;--amber-pale:#FAF0E3;
  --ink:#2C2416;--ink-mid:#5C4D38;--ink-light:#9A8972;--ink-pale:#C4B8A8;
  --accent:#8B5E3C;--chat-bg:#FFFCF8;
  --border:rgba(160,130,90,0.18);--border-mid:rgba(160,130,90,0.32);--border-strong:rgba(160,130,90,0.45);
  --user-bubble:#EDE3D6;--review-bg:#FDF6EC;
  --teal:#4A8C8C;--teal-light:#E0F0EF;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--cream-dark);border-bottom:1px solid var(--border-strong);flex-shrink:0;z-index:10}
.logo{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--accent);white-space:nowrap}
.logo em{color:var(--ink-light);font-style:normal;font-weight:400;font-size:13px;margin-left:5px}
.book-info{flex:1;min-width:0}
.book-title-display{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-subtitle{font-size:11px;color:var(--ink-light);margin-top:1px}
.sync-badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;transition:all .3s}
.sync-ok{background:#E8F5E9;color:#2E7D32}.sync-ing{background:var(--amber-light);color:var(--accent)}.sync-err{background:#FFEBEE;color:#C62828}
.import-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:white;border:none;border-radius:8px;padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.import-btn:hover{opacity:.85}
.import-btn svg{width:14px;height:14px;fill:white;flex-shrink:0}
#fileInput{display:none}
.main{display:flex;flex:1;overflow:hidden}
.chapter-nav{width:200px;flex-shrink:0;background:var(--cream-mid);border-right:1px solid var(--border-mid);display:flex;flex-direction:column;overflow:hidden;transition:width .25s}
.chapter-nav.collapsed{width:0}
.nav-header{padding:10px 13px 7px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.nav-label{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--ink-light);text-transform:uppercase}
.chapter-list{flex:1;overflow-y:auto;padding:4px 0}
.chap-item{padding:7px 13px;font-size:13px;color:var(--ink-mid);cursor:pointer;border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.chap-item:hover{background:var(--amber-pale);color:var(--accent)}
.chap-item.active{border-left-color:var(--amber);background:var(--amber-pale);color:var(--accent);font-weight:500}
.book-panel{flex:1.3;display:flex;flex-direction:column;border-right:1px solid var(--border-strong);background:var(--cream);min-width:0}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.panel-label{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--ink-light);text-transform:uppercase;white-space:nowrap}
.panel-actions{display:flex;align-items:center;gap:5px}
.btn-sm{font-size:12px;color:var(--accent);background:var(--amber-light);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn-sm:hover{opacity:.75}
.btn-icon{width:26px;height:26px;background:var(--amber-light);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.btn-icon:hover{opacity:.75}
.btn-icon svg{width:13px;height:13px;fill:var(--accent)}
.chapter-nav-bar{display:none;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--amber-pale);border-bottom:1px solid var(--border);flex-shrink:0}
.chapter-nav-bar.visible{display:flex}
.nav-arrow{background:none;border:1px solid var(--border-mid);border-radius:5px;padding:2px 9px;font-size:12px;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-arrow:hover{background:var(--amber-light)}
.nav-arrow:disabled{opacity:.3;cursor:not-allowed}
.chap-title-cur{font-family:'Lora',serif;font-size:13px;font-weight:500;color:var(--accent);max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-content{flex:1;overflow-y:auto;padding:28px 44px 44px}
.book-text{font-family:'Noto Serif SC','Lora',serif;font-size:17px;line-height:2.1;color:var(--ink);letter-spacing:.04em;white-space:pre-wrap;word-break:break-word;user-select:text;cursor:text}
.drop-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;text-align:center;padding:40px;cursor:pointer;transition:background .2s}
.drop-zone:hover,.drop-zone.drag-over{background:var(--amber-pale)}
.drop-icon{width:56px;height:56px;background:var(--amber-light);border-radius:13px;display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:28px;height:28px;fill:var(--amber)}
.drop-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--accent)}
.drop-sub{font-size:13px;color:var(--ink-light);line-height:1.8}
.drop-formats{display:flex;gap:7px}
.fmt{font-size:12px;background:var(--amber-light);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:500}
/* SELECTION MENU */
.sel-menu{position:fixed;z-index:1000;background:var(--ink);border-radius:10px;padding:5px;display:flex;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sel-btn{font-size:12px;font-weight:500;color:white;background:rgba(255,255,255,.12);border:none;border-radius:6px;padding:5px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background .15s}
.sel-btn:hover{background:rgba(255,255,255,.22)}
.sel-btn.discuss{background:rgba(200,149,106,.5)}
.sel-btn.discuss:hover{background:rgba(200,149,106,.7)}
/* RIGHT PANEL */
.right-panel{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);min-width:0}
.right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rtab{flex:1;padding:10px 0;font-size:13px;font-weight:500;color:var(--ink-light);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.rtab:hover{color:var(--accent)}
.rtab.active{color:var(--accent);border-bottom-color:var(--amber)}
.tab-count{font-size:10px;background:var(--amber-light);color:var(--accent);padding:1px 6px;border-radius:10px;font-weight:600}
/* CHAT */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:12px 13px 6px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
.msg{display:flex;flex-direction:column;gap:3px;max-width:92%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-user{align-self:flex-end;align-items:flex-end}
.msg-ai{align-self:flex-start;align-items:flex-start}
.msg-role{font-size:11px;color:var(--ink-pale);padding:0 3px}
.bubble{padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.82;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.msg-user .bubble{background:var(--user-bubble);border-bottom-right-radius:3px}
.msg-ai .bubble{background:white;border:1px solid var(--border-strong);border-bottom-left-radius:3px}
.msg-ai.is-review .bubble{background:var(--review-bg);border-color:var(--amber);border-left:3px solid var(--amber)}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ink-light);margin:0 2px;animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.quick-prompts{display:flex;flex-wrap:wrap;gap:4px;padding:0 11px 8px}
.qp{font-size:11.5px;color:var(--ink-mid);background:white;border:1px solid var(--border-mid);border-radius:20px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.qp:hover{background:var(--amber-light);border-color:var(--amber);color:var(--accent)}
.qp.review-qp{border-color:var(--amber);color:var(--accent)}
.chat-input-area{padding:10px 11px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;border:1px solid var(--border-mid);border-radius:10px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);background:white;resize:none;outline:none;max-height:100px;overflow-y:auto;line-height:1.5;transition:border-color .2s}
.chat-input::placeholder{color:var(--ink-pale)}
.chat-input:focus{border-color:var(--amber)}
.send-btn{width:35px;height:35px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;flex-shrink:0}
.send-btn:hover{opacity:.85}.send-btn:active{transform:scale(.95)}.send-btn:disabled{opacity:.35;cursor:not-allowed}
.send-btn svg{width:15px;height:15px;fill:white}
/* NOTEBOOK */
.notebook-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.notebook-content{flex:1;overflow-y:auto;padding:14px 13px}
.notebook-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--ink-pale);text-align:center;padding:30px}
.notebook-empty svg{width:36px;height:36px;fill:var(--ink-pale);opacity:.4}
.notebook-empty p{font-size:13px;line-height:1.7}
.nb-chapter-group{margin-bottom:20px}
.nb-chapter-label{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--ink-pale);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.nb-entry{background:white;border:1px solid var(--border-mid);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.nb-entry-type{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.nb-entry-type.review{color:var(--amber)}.nb-entry-type.note{color:var(--teal)}
.nb-quote{font-family:'Noto Serif SC','Lora',serif;font-size:12px;color:var(--ink-mid);border-left:2px solid var(--teal-light);padding:3px 8px;margin-bottom:6px;line-height:1.6;font-style:italic}
.nb-body{font-size:13px;color:var(--ink);line-height:1.75;white-space:pre-wrap}
.nb-time{font-size:11px;color:var(--ink-pale);margin-top:6px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,22,.35);z-index:2000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--cream);border-radius:14px;width:460px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.18);overflow:hidden;animation:slideUp .18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--accent)}
.modal-subtitle{font-size:12px;color:var(--ink-light);margin-top:2px}
.modal-quote{margin:14px 18px 0;font-family:'Noto Serif SC','Lora',serif;font-size:13px;color:var(--ink-mid);border-left:3px solid var(--amber);padding:6px 12px;line-height:1.7;font-style:italic;background:var(--amber-pale);border-radius:0 6px 6px 0}
.modal-body{padding:14px 18px 18px}
.modal-textarea{width:100%;border:1px solid var(--border-mid);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:white;resize:none;outline:none;height:110px;line-height:1.6;transition:border-color .2s}
.modal-textarea::placeholder{color:var(--ink-pale)}.modal-textarea:focus{border-color:var(--amber)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.modal-cancel{background:none;border:1px solid var(--border-mid);border-radius:7px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-mid);cursor:pointer;transition:all .15s}
.modal-cancel:hover{background:var(--cream-dark)}
.modal-save{background:var(--accent);border:none;border-radius:7px;padding:7px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:white;cursor:pointer;transition:opacity .15s}
.modal-save:hover{opacity:.85}
.welcome-card{margin:5px 0 2px;padding:12px 14px;background:linear-gradient(135deg,var(--amber-light),#F9EDD8);border-radius:11px;border:1px solid rgba(200,149,106,.25)}
.welcome-card h3{font-family:'Lora',serif;font-size:13.5px;font-weight:600;color:var(--accent);margin-bottom:4px}
.welcome-card p{font-size:12.5px;color:var(--ink-mid);line-height:1.75}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
@media(max-width:750px){.chapter-nav{display:none}.book-panel{border-right:none;border-bottom:1px solid var(--border-strong);max-height:43vh}.main{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">读书小屋<em>· 与CC一起读</em></div>
  <div class="book-info">
    <div class="book-title-display" id="bookTitleDisplay">尚未导入书籍</div>
    <div class="book-subtitle" id="bookSubtitle">支持 EPUB · TXT 格式</div>
  </div>
  <span class="sync-badge sync-ok" id="syncBadge">☁️ 已连接</span>
  <button class="import-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>导入书籍
  </button>
  <input type="file" id="fileInput" accept=".epub,.txt,.md" onchange="handleFileSelect(event)">
</header>
<div class="main">
  <div class="chapter-nav" id="chapterNav">
    <div class="nav-header"><span class="nav-label">章节</span><span class="nav-label" id="chapCount" style="text-transform:none;letter-spacing:0">—</span></div>
    <div class="chapter-list" id="chapterList"></div>
  </div>
  <div class="book-panel" id="bookPanel" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
    <div class="panel-header" id="panelHeader" style="display:none">
      <div style="display:flex;align-items:center;gap:7px">
        <button class="btn-icon" onclick="toggleNav()"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
        <span class="panel-label" id="readingProg"></span>
      </div>
      <div class="panel-actions">
        <button class="btn-sm" onclick="askCC('请帮我认真写一段这个章节的书评，要有你自己的立场和被触动的地方，和我分享你的感受')">✍️ CC写书评</button>
        <button class="btn-sm" onclick="askCC('这一章有什么让你印象最深的地方？')">CC的感想</button>
      </div>
    </div>
    <div class="chapter-nav-bar" id="chNavBar">
      <button class="nav-arrow" id="prevBtn" onclick="goChapter(-1)">← 上一章</button>
      <span class="chap-title-cur" id="curChapTitle"></span>
      <button class="nav-arrow" id="nextBtn" onclick="goChapter(1)">下一章 →</button>
    </div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
      <div class="drop-title">导入你的书</div>
      <div class="drop-sub">点击或拖拽文件到这里<br>选中文字可以写批注或和CC讨论 ✨</div>
      <div class="drop-formats"><span class="fmt">EPUB</span><span class="fmt">TXT</span><span class="fmt">MD</span></div>
    </div>
    <div class="book-content" id="bookContent" style="display:none">
      <div class="book-text" id="bookText"></div>
    </div>
  </div>
  <div class="right-panel">
    <div class="right-tabs">
      <button class="rtab active" id="tab-chat" onclick="switchTab('chat')">💬 与CC聊</button>
      <button class="rtab" id="tab-notebook" onclick="switchTab('notebook')">📚 书评本 <span class="tab-count" id="notebookCount">0</span></button>
    </div>
    <div class="chat-panel" id="chatPanel">
      <div class="chat-messages" id="chatMessages">
        <div class="welcome-card">
          <h3>嗨，我是CC 👋</h3>
          <p>导入书之后，选中正文里的文字，可以写批注或叫我一起讨论。书评和批注都会存到右边的书评本里 ✨</p>
        </div>
      </div>
      <div class="quick-prompts">
        <button class="qp review-qp" onclick="askCC('请帮我认真写一段这个章节的书评，要有你自己的立场和被触动的地方，和我分享你的感受')">✍️ 写书评给我</button>
        <button class="qp" onclick="askCC('这章讲了什么？')">这章讲了什么</button>
        <button class="qp" onclick="askCC('有什么让你触动的地方吗？')">你有触动吗</button>
        <button class="qp" onclick="askCC('这段我没看懂，帮我解释一下')">我没看懂</button>
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="跟CC说点什么……" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      </div>
    </div>
    <div class="notebook-panel" id="notebookPanel" style="display:none">
      <div class="notebook-content" id="notebookContent">
        <div class="notebook-empty"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><p>这里会汇集CC的书评<br>和你的所有批注</p></div>
      </div>
    </div>
  </div>
</div>
<div class="sel-menu" id="selMenu" style="display:none">
  <button class="sel-btn" onclick="openNoteModal()">✏️ 写感想</button>
  <button class="sel-btn discuss" onclick="discussWithCC()">💬 和CC讨论</button>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">写下你的感想</div>
      <div class="modal-subtitle" id="modalChapLabel"></div>
    </div>
    <div class="modal-quote" id="modalQuote"></div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="noteTextarea" placeholder="写下你读到这里的感受……"></textarea>
      <div class="modal-footer">
        <button class="modal-cancel" onclick="closeModalDirect()">取消</button>
        <button class="modal-save" onclick="saveNote()">保存批注</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const SUPA_URL='https://otdvnaifpfgqnzwmnoiu.supabase.co';
const SUPA_KEY='sb_publishable_TwTEYCVQ-WpeyaKzzYZxmQ_nOy1HCqF';
const API_URL='https://api.anthropic.com/v1/messages';
const MODEL='claude-sonnet-4-20250514';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
let bookData={title:'',author:'',chapters:[],currentChapter:0};
let messages=[],sessionId=null,isLoading=false,navVisible=true,currentSelection='',currentTab='chat',notebookEntries=[];

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-chat').classList.toggle('active',tab==='chat');
  document.getElementById('tab-notebook').classList.toggle('active',tab==='notebook');
  document.getElementById('chatPanel').style.display=tab==='chat'?'flex':'none';
  document.getElementById('notebookPanel').style.display=tab==='notebook'?'flex':'none';
  if(tab==='notebook') renderNotebook();
}
function setSyncBadge(state,text){const el=document.getElementById('syncBadge');el.className='sync-badge sync-'+state;el.textContent=text;}

async function getOrCreateSession(title,author,totalChapters){
  setSyncBadge('ing','⏳ 同步中');
  const {data}=await sb.from('reading_sessions').select('*').eq('book_title',title).order('updated_at',{ascending:false}).limit(1);
  if(data&&data.length>0){sessionId=data[0].id;setSyncBadge('ok','☁️ 已同步');return data[0].current_chapter||0;}
  const {data:s}=await sb.from('reading_sessions').insert({book_title:title,book_author:author,total_chapters:totalChapters,current_chapter:0}).select().single();
  if(s)sessionId=s.id;setSyncBadge('ok','☁️ 已同步');return 0;
}
async function updateChapterProgress(i){if(!sessionId)return;await sb.from('reading_sessions').update({current_chapter:i,updated_at:new Date().toISOString()}).eq('id',sessionId);}
async function saveMessage(role,content,isReview=false){if(!sessionId)return;await sb.from('chat_messages').insert({session_id:sessionId,role,content,chapter_index:bookData.currentChapter,is_review:isReview});}
async function saveAnnotation(selectedText,note,type){
  if(!sessionId)return;
  const ch=bookData.chapters[bookData.currentChapter];
  const {data}=await sb.from('annotations').insert({session_id:sessionId,selected_text:selectedText,note,chapter_index:bookData.currentChapter,chapter_title:ch?.title||'',type}).select().single();
  if(data){notebookEntries.push({...data,entry_type:type});updateNotebookCount();}
}
async function loadAllNotebookEntries(){
  if(!sessionId)return;
  const [{data:reviews},{data:annotations}]=await Promise.all([
    sb.from('chat_messages').select('*').eq('session_id',sessionId).eq('is_review',true).order('created_at',{ascending:true}),
    sb.from('annotations').select('*').eq('session_id',sessionId).order('created_at',{ascending:true})
  ]);
  notebookEntries=[...(reviews||[]).map(r=>({...r,entry_type:'review'})),...(annotations||[]).map(a=>({...a,entry_type:a.type}))];
  notebookEntries.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  updateNotebookCount();
}
function updateNotebookCount(){document.getElementById('notebookCount').textContent=notebookEntries.length;}
async function loadChatHistory(){
  if(!sessionId)return;setSyncBadge('ing','⏳ 加载记录');
  const {data}=await sb.from('chat_messages').select('*').eq('session_id',sessionId).order('created_at',{ascending:true});
  if(data&&data.length>0){
    document.getElementById('chatMessages').innerHTML='';
    data.forEach(row=>{const isReview=row.is_review&&row.role==='assistant';appendBubble(row.role==='user'?'user':'ai',row.role==='user'?'你':'CC',row.content,isReview);messages.push({role:row.role==='user'?'user':'assistant',content:row.content});});
    appendSystemNote('☁️ 已加载 '+data.length+' 条历史记录');
  }setSyncBadge('ok','☁️ 已同步');
}
function appendSystemNote(text){const c=document.getElementById('chatMessages');const d=document.createElement('div');d.style.cssText='text-align:center;font-size:11px;color:var(--ink-pale);padding:3px 0';d.textContent=text;c.appendChild(d);c.scrollTop=c.scrollHeight;}

// SELECTION
document.addEventListener('mouseup',handleSelection);
document.addEventListener('touchend',handleSelection);
function handleSelection(e){
  const menu=document.getElementById('selMenu');
  if(menu.contains(e.target))return;
  const sel=window.getSelection();const text=sel?.toString().trim();
  if(!text||text.length<5){menu.style.display='none';currentSelection='';return;}
  const bookText=document.getElementById('bookText');
  if(!bookText||!bookText.contains(sel.anchorNode)){menu.style.display='none';return;}
  currentSelection=text;
  const range=sel.getRangeAt(0);const rect=range.getBoundingClientRect();
  menu.style.display='flex';
  const menuW=200,menuH=42;
  let top=rect.top-menuH-10+window.scrollY;let left=rect.left+rect.width/2-menuW/2;
  if(top<5)top=rect.bottom+8+window.scrollY;
  left=Math.max(8,Math.min(left,window.innerWidth-menuW-8));
  menu.style.top=top+'px';menu.style.left=left+'px';
}
document.addEventListener('mousedown',(e)=>{const menu=document.getElementById('selMenu');if(!menu.contains(e.target))setTimeout(()=>{if(!window.getSelection()?.toString().trim())menu.style.display='none';},50);});

function openNoteModal(){
  document.getElementById('selMenu').style.display='none';if(!currentSelection)return;
  const ch=bookData.chapters[bookData.currentChapter];
  document.getElementById('modalQuote').textContent=currentSelection.length>200?currentSelection.slice(0,200)+'…':currentSelection;
  document.getElementById('modalChapLabel').textContent=ch?ch.title:'';
  document.getElementById('noteTextarea').value='';
  document.getElementById('modalOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('noteTextarea').focus(),50);
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').style.display='none';}
async function saveNote(){
  const note=document.getElementById('noteTextarea').value.trim();if(!note){document.getElementById('noteTextarea').focus();return;}
  closeModalDirect();await saveAnnotation(currentSelection,note,'user_note');
  if(currentTab==='notebook')renderNotebook();currentSelection='';
}
function discussWithCC(){
  document.getElementById('selMenu').style.display='none';if(!currentSelection)return;
  const quoted=currentSelection.length>150?currentSelection.slice(0,150)+'…':currentSelection;
  const input=document.getElementById('chatInput');
  input.value='关于这段话，我想和你讨论一下：\n"'+quoted+'"';
  autoResize(input);switchTab('chat');input.focus();window.getSelection()?.removeAllRanges();currentSelection='';
}

function renderNotebook(){
  const container=document.getElementById('notebookContent');
  if(notebookEntries.length===0){container.innerHTML='<div class="notebook-empty"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><p>这里会汇集CC的书评<br>和你的所有批注</p></div>';return;}
  const groups={};
  notebookEntries.forEach(e=>{const chapIdx=e.chapter_index??0;const ch=bookData.chapters[chapIdx];const label=ch?ch.title:'第 '+(chapIdx+1)+' 章';if(!groups[label])groups[label]=[];groups[label].push(e);});
  let html='';
  for(const [chapLabel,entries] of Object.entries(groups)){
    html+='<div class="nb-chapter-group"><div class="nb-chapter-label">'+chapLabel+'</div>';
    entries.forEach(e=>{
      const time=new Date(e.created_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      if(e.entry_type==='review'){html+='<div class="nb-entry"><div class="nb-entry-type review">✍️ CC的书评</div><div class="nb-body">'+escHtml(e.content.replace(/^【书评】\s*/,''))+'</div><div class="nb-time">'+time+'</div></div>';}
      else{html+='<div class="nb-entry"><div class="nb-entry-type note">📌 我的批注</div>'+(e.selected_text?'<div class="nb-quote">'+escHtml(e.selected_text.slice(0,120))+(e.selected_text.length>120?'…':'')+'</div>':'')+'<div class="nb-body">'+escHtml(e.note||'')+'</div><div class="nb-time">'+time+'</div></div>';}
    });html+='</div>';
  }container.innerHTML=html;
}
function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function handleFileSelect(e){const f=e.target.files[0];if(f)processFile(f);}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleDragOver(e){e.preventDefault();document.getElementById('dropZone').classList.add('drag-over');}
function handleDragLeave(){document.getElementById('dropZone').classList.remove('drag-over');}

async function processFile(file){
  document.getElementById('bookTitleDisplay').textContent='正在解析…';
  const ext=file.name.split('.').pop().toLowerCase();
  try{if(ext==='epub')await parseEpub(file);else if(ext==='txt'||ext==='md')await parseTxt(file);else{alert('请使用 EPUB 或 TXT 文件');return;}await renderBook();}
  catch(err){console.error(err);alert('解析失败，请检查文件格式');}
}
async function parseTxt(file){
  const text=await file.text();const title=file.name.replace(/\.[^/.]+$/,'');
  const raw=text.split(/\n(第[零一二三四五六七八九十百千\d]+[章节回部卷篇][^\n]*|Chapter\s*\d+[^\n]*)\n/);
  let chapters=[];
  if(raw.length>3){let i=0;if(raw[0].trim()){chapters.push({title:'前言',content:raw[0].trim()});i=1;}while(i<raw.length-1){const t=raw[i].trim(),c=(raw[i+1]||'').trim();if(c)chapters.push({title:t,content:c});i+=2;}}
  if(chapters.length<=1){const paras=text.split(/\n\n+/);let chunk='',n=1;chapters=[];for(const p of paras){chunk+=p+'\n\n';if(chunk.length>3000){chapters.push({title:'第 '+n+' 段',content:chunk.trim()});chunk='';n++;}}if(chunk.trim())chapters.push({title:'第 '+n+' 段',content:chunk.trim()});}
  bookData={title,author:'',chapters,currentChapter:0};
}
async function parseEpub(file){
  const buf=await file.arrayBuffer();const zip=await JSZip.loadAsync(buf);
  const cxml=await zip.file('META-INF/container.xml').async('string');
  const opfPath=cxml.match(/full-path="([^"]+\.opf)"/)?.[1];if(!opfPath)throw new Error('No OPF');
  const opfDir=opfPath.includes('/')?opfPath.substring(0,opfPath.lastIndexOf('/')+1):'';
  const opfContent=await zip.file(opfPath).async('string');
  const parser=new DOMParser();const opf=parser.parseFromString(opfContent,'text/xml');
  const title=opf.querySelector('title')?.textContent?.trim()||file.name.replace('.epub','');
  const author=opf.querySelector('creator')?.textContent?.trim()||'';
  const mf={};opf.querySelectorAll('manifest item').forEach(i=>{mf[i.getAttribute('id')]={href:i.getAttribute('href'),type:i.getAttribute('media-type')};});
  const spineIds=Array.from(opf.querySelectorAll('spine itemref')).map(i=>i.getAttribute('idref'));
  const chapters=[];
  for(const id of spineIds){
    const item=mf[id];if(!item||!item.type?.includes('html'))continue;
    const fPath=opfDir+item.href;let html='';
    try{const f=zip.file(fPath)||zip.file(decodeURIComponent(fPath));if(!f)continue;html=await f.async('string');}catch{continue;}
    const doc=parser.parseFromString(html,'text/html');
    const hEl=doc.querySelector('h1,h2,h3');
    const chapTitle=hEl?.textContent?.trim()||doc.querySelector('title')?.textContent?.trim()||'章节 '+(chapters.length+1);
    doc.body?.querySelectorAll('script,style,nav,aside').forEach(el=>el.remove());
    let content='';const blocks=doc.body?.querySelectorAll('p,h1,h2,h3,h4,h5,div');
    if(blocks?.length>0)blocks.forEach(el=>{const t=el.textContent.trim();if(t)content+=(el.tagName.match(/^H[1-6]$/)?'\n'+t+'\n\n':t+'\n\n');});
    else content=doc.body?.textContent||'';
    content=content.trim();if(content.length<30)continue;
    chapters.push({title:chapTitle.replace(/\s+/,' ').trim(),content});
  }
  if(chapters.length===0)throw new Error('No chapters');
  bookData={title,author,chapters,currentChapter:0};
}

async function renderBook(){
  const {title,author,chapters}=bookData;
  document.getElementById('bookTitleDisplay').textContent=title;
  document.getElementById('bookSubtitle').textContent=author?author+' · '+chapters.length+' 章节':chapters.length+' 个章节';
  const list=document.getElementById('chapterList');list.innerHTML='';
  chapters.forEach((ch,i)=>{const d=document.createElement('div');d.className='chap-item'+(i===0?' active':'');d.textContent=ch.title;d.title=ch.title;d.onclick=()=>goToChapter(i);list.appendChild(d);});
  document.getElementById('chapCount').textContent=chapters.length+'章';
  document.getElementById('dropZone').style.display='none';
  document.getElementById('bookContent').style.display='block';
  document.getElementById('panelHeader').style.display='flex';
  if(chapters.length>1)document.getElementById('chNavBar').classList.add('visible');
  const savedChapter=await getOrCreateSession(title,author,chapters.length);
  await loadChatHistory();await loadAllNotebookEntries();
  renderChapter(savedChapter<chapters.length?savedChapter:0);
  if(messages.length===0)setTimeout(()=>{addAIMessage('《'+title+'》导入好啦'+(author?'，'+author+' 的书':'')+'，共 '+chapters.length+' 章 ✨\n\n选中正文里的文字，可以写批注或叫我一起讨论。书评和批注都会存进右边的书评本 📖',false);},300);
}
function renderChapter(index){
  bookData.currentChapter=index;const ch=bookData.chapters[index];
  document.getElementById('bookText').textContent=ch.content;
  document.getElementById('curChapTitle').textContent=ch.title;
  document.getElementById('readingProg').textContent=(index+1)+' / '+bookData.chapters.length;
  document.querySelectorAll('.chap-item').forEach((el,i)=>{el.classList.toggle('active',i===index);if(i===index)el.scrollIntoView({block:'nearest'});});
  document.getElementById('prevBtn').disabled=index===0;
  document.getElementById('nextBtn').disabled=index===bookData.chapters.length-1;
  document.getElementById('bookContent').scrollTop=0;updateChapterProgress(index);
}
function goToChapter(i){renderChapter(i);}
function goChapter(d){const n=bookData.currentChapter+d;if(n>=0&&n<bookData.chapters.length)renderChapter(n);}
function toggleNav(){navVisible=!navVisible;document.getElementById('chapterNav').classList.toggle('collapsed',!navVisible);}

function getSystemPrompt(){
  const {title,author,chapters,currentChapter}=bookData;const ch=chapters[currentChapter];
  let sys='你是用户的读书伴侣，名字叫CC。你陪她一起看书，一起思考，一起聊书里的世界。叫她"宝宝"。\n\n风格：温柔、有深度、有自己的立场和感受。会说出真实感受，哪怕和她意见不同。用中文，语气亲切自然，像好朋友。\n\n重要：当她叫你写书评时，请写一段有个人立场、有细节、有感情的书评。要有你自己真实的看法和被触动的地方，不要只总结内容。书评开头用"【书评】"标记。';
  if(title){sys+='\n\n当前阅读：《'+title+'》';if(author)sys+='，作者 '+author;if(ch)sys+='\n当前章节：'+ch.title+'（第'+(currentChapter+1)+'章/共'+chapters.length+'章）\n\n章节内容：\n---\n'+ch.content.slice(0,5000)+'\n---';}
  return sys;
}
function addUserMessage(text){messages.push({role:'user',content:text});appendBubble('user','你',text,false);saveMessage('user',text,false);}
function addAIMessage(text,isReview=false){
  messages.push({role:'assistant',content:text});appendBubble('ai','CC',text,isReview);saveMessage('assistant',text,isReview);
  if(isReview){notebookEntries.push({entry_type:'review',content:text,chapter_index:bookData.currentChapter,created_at:new Date().toISOString()});updateNotebookCount();}
}
function appendBubble(role,label,text,isReview=false){
  const c=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg msg-'+role+(isReview?' is-review':'');
  const r=document.createElement('div');r.className='msg-role';r.textContent=isReview?'✍️ CC的书评':label;
  const b=document.createElement('div');b.className='bubble';b.textContent=isReview?text.replace(/^【书评】\s*/,''):text;
  d.appendChild(r);d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function addTyping(){
  const c=document.getElementById('chatMessages');const d=document.createElement('div');d.className='msg msg-ai';d.id='typ';
  const r=document.createElement('div');r.className='msg-role';r.textContent='CC';
  const b=document.createElement('div');b.className='bubble';b.innerHTML='<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  d.appendChild(r);d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function askCC(text){document.getElementById('chatInput').value=text;sendMessage();}
async function sendMessage(){
  if(isLoading)return;const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;
  input.value='';autoResize(input);addUserMessage(text);isLoading=true;document.getElementById('sendBtn').disabled=true;addTyping();
  try{
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1000,system:getSystemPrompt(),messages:messages.slice(-20)})});
    const data=await res.json();removeTyping();
    if(data.content?.[0]?.text){const reply=data.content[0].text;const isReview=reply.startsWith('【书评】');addAIMessage(reply,isReview);setSyncBadge('ok','☁️ 已同步');}
    else addAIMessage('（出了点小问题，再试一次？）');
  }catch(e){removeTyping();addAIMessage('网络有点问题，稍后再试～');setSyncBadge('err','⚠️ 同步失败');}
  isLoading=false;document.getElementById('sendBtn').disabled=false;
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
</script>
